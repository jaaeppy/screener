<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>차트 미리보기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #f5f5f3; padding: 24px 16px; }
.card { background: #fff; border-radius: 14px; border: 0.5px solid #e5e5e5; padding: 16px; max-width: 380px; margin: 0 auto 24px; }
.card-name { font-size: 17px; font-weight: 700; margin-bottom: 2px; }
.card-code { font-size: 12px; color: #aaa; margin-bottom: 10px; }
.chart-wrap { border-radius: 10px; overflow: hidden; background: #fafafa; margin: 12px 0 4px; }
.chart-legend { display: flex; gap: 8px; font-size: 10px; color: #aaa; padding: 0 2px 4px; flex-wrap: wrap; }
.dot { display: inline-block; width: 20px; height: 2px; border-radius: 1px; vertical-align: middle; margin-right: 2px; }
.sq  { display: inline-block; width: 8px; height: 8px; border-radius: 1px; vertical-align: middle; margin-right: 2px; }
.label { font-size: 11px; color: #888; font-weight: 600; margin-bottom: 6px; }
</style>
</head>
<body>

<div class="label" style="text-align:center;margin-bottom:16px;color:#aaa;font-size:12px;font-weight:400">거래량 추가 차트 미리보기 — 두 가지 안</div>

<!-- 안 1 -->
<div class="card">
  <div class="card-name">안 1 — 차트 하단에 거래량 바 추가</div>
  <div class="card-code">캔들 65% + 거래량 35% 비율</div>
  <div class="chart-wrap" id="chart1"></div>
  <div class="chart-legend">
    <span><span class="dot" style="background:#F5A623"></span>10주선</span>
    <span><span class="dot" style="background:#9B59B6"></span>20주선</span>
    <span><span class="dot" style="background:#3498DB"></span>30주선</span>
    <span><span class="sq" style="background:#1D9E75;opacity:0.6"></span>양봉 거래량</span>
    <span><span class="sq" style="background:#E24B4A;opacity:0.6"></span>음봉 거래량</span>
    <span><span class="dot" style="background:#aaa;border-top:1px dashed #aaa"></span>평균</span>
  </div>
</div>

<!-- 안 2 -->
<div class="card">
  <div class="card-name">안 2 — 거래량을 캔들 뒤에 반투명</div>
  <div class="card-code">거래량을 배경 바로 표시 (캔들과 겹침)</div>
  <div class="chart-wrap" id="chart2"></div>
  <div class="chart-legend">
    <span><span class="dot" style="background:#F5A623"></span>10주선</span>
    <span><span class="dot" style="background:#9B59B6"></span>20주선</span>
    <span><span class="dot" style="background:#3498DB"></span>30주선</span>
    <span><span class="sq" style="background:#1D9E75;opacity:0.25"></span>거래량 배경</span>
  </div>
</div>

<script>
// 24주 모의 데이터 (하락 후 급등)
const candles = [
  [420,440,400,415],[415,425,395,400],[400,412,382,386],[386,396,366,371],
  [371,379,356,361],[361,371,349,353],[353,363,341,346],[346,356,333,339],
  [339,349,326,331],[331,343,319,323],[323,336,316,321],[321,333,311,316],
  [316,329,309,313],[313,326,306,311],[311,323,303,309],[309,321,301,306],
  [306,319,299,303],[303,316,296,299],[299,313,293,296],[296,311,291,309],
  [309,326,306,321],[321,585,319,572],[572,625,562,592],[592,685,582,672]
];
const volumes = [
  120,100,140,160,180,130,110,150,120,140,
  130,110,120,135,125,140,130,115,120,210,
  380,850,620,980
];

// MA 계산
const closes = candles.map(c=>c[3]);
const ma10=[], ma20=[], ma30=[];
for(let i=0;i<24;i++){
  ma10.push(i>=9  ? closes.slice(i-9,i+1).reduce((a,b)=>a+b)/10  : 0);
  ma20.push(i>=19 ? closes.slice(i-19,i+1).reduce((a,b)=>a+b)/20 : 0);
  ma30.push(0);
}

// ── 안 1: 분리형 ─────────────────────────
function chart1(id, w, h) {
  const CANDLE_RATIO = 0.63;
  const GAP = 4;
  const candleH = Math.round(h * CANDLE_RATIO);
  const volH    = h - candleH - GAP;
  const pad = {t:4,b:2,l:4,r:4};
  const iw = w - pad.l - pad.r;
  const n = candles.length;
  const slotW = iw / n;
  const cw = Math.max(1.5, slotW * 0.58);

  const allC = candles.flatMap(c=>[c[1],c[2]]);
  const maV  = [...ma10,...ma20].filter(v=>v>0);
  const minC = Math.min(...allC,...maV);
  const maxC = Math.max(...allC,...maV);
  const yc = v => pad.t + candleH - ((v-minC)/(maxC-minC))*candleH;
  const xp = i => pad.l + slotW*i + slotW/2;

  const volTop = pad.t + candleH + GAP;
  const maxVol = Math.max(...volumes);
  const avgVol = volumes.reduce((a,b)=>a+b)/volumes.length;

  let s = `<svg width="${w}" height="${h}" style="display:block">`;

  // grid
  [0,1,2,3].forEach(g=>{
    const gy = pad.t + (candleH/3)*g;
    s += `<line x1="${pad.l}" y1="${gy}" x2="${w-pad.r}" y2="${gy}" stroke="#f0f0f0" stroke-width="0.5"/>`;
  });

  // vol separator
  s += `<line x1="${pad.l}" y1="${volTop-2}" x2="${w-pad.r}" y2="${volTop-2}" stroke="#ebebeb" stroke-width="0.8"/>`;

  // vol avg dashed
  const avgY = volTop + volH*(1 - avgVol/maxVol);
  s += `<line x1="${pad.l}" y1="${avgY}" x2="${w-pad.r}" y2="${avgY}" stroke="#ccc" stroke-width="0.6" stroke-dasharray="2,2"/>`;

  // vol bars
  volumes.forEach((v,i)=>{
    const bull = candles[i][3]>=candles[i][0];
    const col  = bull?'#1D9E75':'#E24B4A';
    const bh   = Math.max(1, (v/maxVol)*volH);
    const isHigh = v > avgVol*1.8;
    s += `<rect x="${xp(i)-cw/2}" y="${volTop+volH-bh}" width="${cw}" height="${bh}" fill="${col}" opacity="${isHigh?0.75:0.38}" rx="0.5"/>`;
  });

  // vol label
  s += `<text x="${pad.l+2}" y="${volTop+8}" font-size="7" fill="#ccc" font-family="sans-serif">거래량</text>`;

  // candles
  candles.forEach(([o,hh,l,c],i)=>{
    const x=xp(i), bull=c>=o, col=bull?'#1D9E75':'#E24B4A';
    s += `<line x1="${x}" y1="${yc(hh)}" x2="${x}" y2="${yc(l)}" stroke="${col}" stroke-width="0.8"/>`;
    const top=yc(Math.max(o,c)), bot=yc(Math.min(o,c));
    s += `<rect x="${x-cw/2}" y="${top}" width="${cw}" height="${Math.max(0.8,bot-top)}" fill="${col}" rx="0.4"/>`;
  });

  // MA
  function mp(arr,col){
    const pts=arr.map((v,i)=>v>0?`${xp(i)},${yc(v)}`:null).filter(Boolean);
    if(pts.length>1) s+=`<polyline points="${pts.join(' ')}" fill="none" stroke="${col}" stroke-width="1.2" opacity="0.85"/>`;
  }
  mp(ma10,'#F5A623'); mp(ma20,'#9B59B6'); mp(ma30,'#3498DB');

  s+=`</svg>`;
  document.getElementById(id).innerHTML=s;
}

// ── 안 2: 배경 겹침형 ─────────────────────────
function chart2(id, w, h) {
  const pad={t:4,b:4,l:4,r:4};
  const iw=w-pad.l-pad.r, ih=h-pad.t-pad.b;
  const n=candles.length;
  const slotW=iw/n;
  const cw=Math.max(1.5,slotW*0.58);

  const allC=candles.flatMap(c=>[c[1],c[2]]);
  const maV=[...ma10,...ma20].filter(v=>v>0);
  const minC=Math.min(...allC,...maV);
  const maxC=Math.max(...allC,...maV);
  const yc=v=>pad.t+ih-((v-minC)/(maxC-minC))*ih;
  const xp=i=>pad.l+slotW*i+slotW/2;
  const maxVol=Math.max(...volumes);
  const avgVol=volumes.reduce((a,b)=>a+b)/volumes.length;

  let s=`<svg width="${w}" height="${h}" style="display:block">`;

  // grid
  [0,1,2,3].forEach(g=>{
    s+=`<line x1="${pad.l}" y1="${pad.t+(ih/3)*g}" x2="${w-pad.r}" y2="${pad.t+(ih/3)*g}" stroke="#f0f0f0" stroke-width="0.5"/>`;
  });

  // vol bars (bg, max 60% of chart height)
  const maxBarH = ih * 0.6;
  volumes.forEach((v,i)=>{
    const bull=candles[i][3]>=candles[i][0];
    const bh=Math.max(1,(v/maxVol)*maxBarH);
    const isHigh=v>avgVol*1.8;
    s+=`<rect x="${xp(i)-cw/2}" y="${pad.t+ih-bh}" width="${cw}" height="${bh}" fill="${bull?'#1D9E75':'#E24B4A'}" opacity="${isHigh?0.2:0.1}" rx="0.5"/>`;
  });

  // avg vol line
  const avgBH=(avgVol/maxVol)*maxBarH;
  s+=`<line x1="${pad.l}" y1="${pad.t+ih-avgBH}" x2="${w-pad.r}" y2="${pad.t+ih-avgBH}" stroke="#ccc" stroke-width="0.6" stroke-dasharray="2,2"/>`;

  // candles
  candles.forEach(([o,hh,l,c],i)=>{
    const x=xp(i),bull=c>=o,col=bull?'#1D9E75':'#E24B4A';
    s+=`<line x1="${x}" y1="${yc(hh)}" x2="${x}" y2="${yc(l)}" stroke="${col}" stroke-width="0.8"/>`;
    const top=yc(Math.max(o,c)),bot=yc(Math.min(o,c));
    s+=`<rect x="${x-cw/2}" y="${top}" width="${cw}" height="${Math.max(0.8,bot-top)}" fill="${col}" rx="0.4"/>`;
  });

  // MA
  function mp(arr,col){
    const pts=arr.map((v,i)=>v>0?`${xp(i)},${yc(v)}`:null).filter(Boolean);
    if(pts.length>1) s+=`<polyline points="${pts.join(' ')}" fill="none" stroke="${col}" stroke-width="1.2" opacity="0.85"/>`;
  }
  mp(ma10,'#F5A623'); mp(ma20,'#9B59B6'); mp(ma30,'#3498DB');

  s+=`</svg>`;
  document.getElementById(id).innerHTML=s;
}

chart1('chart1', 348, 140);
chart2('chart2', 348, 110);
</script>
</body>
</html>
