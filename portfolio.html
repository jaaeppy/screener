<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보유종목 점검 — 🐯 야수의 심장</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; }

/* GNB */
.gnb { background: #fff; border-bottom: 1px solid #ebebeb; position: sticky; top: 0; z-index: 200; }
.gnb-inner { max-width: 1400px; margin: 0 auto; padding: 0 16px; display: flex; align-items: center; height: 52px; }
.gnb-logo { font-size: 16px; font-weight: 700; color: #1a1a1a; letter-spacing: -0.5px; margin-right: 28px; text-decoration: none; }
.gnb-logo span { color: #534AB7; }
.gnb-nav { display: flex; align-items: center; height: 100%; gap: 2px; }
.gnb-tab { font-size: 14px; color: #888; text-decoration: none; padding: 0 14px; height: 100%; display: flex; align-items: center; border-bottom: 2px solid transparent; transition: color 0.15s; white-space: nowrap; }
.gnb-tab:hover { color: #333; }
.gnb-tab.active { color: #1a1a1a; font-weight: 600; border-bottom-color: #1a1a1a; }

/* Layout */
.wrap { max-width: 1400px; margin: 0 auto; padding: 24px 16px; }
.page-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
.page-title { font-size: 18px; font-weight: 600; }
.page-sub { font-size: 13px; color: #888; }

/* Add stock input */
.add-area { display: flex; gap: 8px; align-items: center; margin-bottom: 20px; position: relative; }
.add-input { padding: 10px 14px; border-radius: 10px; border: 0.5px solid #ddd; font-size: 13px; width: 280px; outline: none; background: #fff; }
.add-input:focus { border-color: #534AB7; box-shadow: 0 0 0 3px rgba(83,74,183,0.1); }
.add-btn { padding: 10px 18px; border-radius: 10px; border: none; background: #1a1a1a; color: #fff; font-size: 13px; font-weight: 500; cursor: pointer; }
.add-btn:hover { background: #333; }

/* Autocomplete */
.ac-list { position: absolute; top: 100%; left: 0; width: 280px; background: #fff; border: 0.5px solid #ddd; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); max-height: 240px; overflow-y: auto; z-index: 100; display: none; }
.ac-item { padding: 8px 14px; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
.ac-item:hover { background: #f5f5f3; }
.ac-item .code { font-size: 11px; color: #aaa; }

/* Section headers */
.section { margin-bottom: 28px; }
.section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.section-title { font-size: 15px; font-weight: 600; }
.section-count { font-size: 12px; color: #888; }
.section-empty { padding: 32px; text-align: center; color: #aaa; font-size: 13px; background: #fff; border-radius: 12px; border: 0.5px solid #e5e5e5; }

/* Table */
.table-wrap { background: #fff; border-radius: 12px; border: 0.5px solid #e5e5e5; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { padding: 10px 12px; text-align: left; font-weight: 500; font-size: 12px; color: #888; border-bottom: 0.5px solid #eee; white-space: nowrap; background: #fafafa; }
td { padding: 8px 12px; border-bottom: 0.5px solid #f0f0f0; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafaf8; }
.green { color: #1D9E75; } .red { color: #E24B4A; }

/* Badges */
.badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500; }
.badge.strong { background: #EAF3DE; color: #3B6D11; }
.badge.watch  { background: #FAEEDA; color: #854F0B; }
.badge.weak   { background: #FCEBEB; color: #A32D2D; }
.badge.bull   { background: #EAF3DE; color: #3B6D11; }
.badge.bear   { background: #FCEBEB; color: #A32D2D; }
.badge.first  { background: #FDE8F8; color: #8B1A7E; }
.badge.weeks  { background: #F0F0F0; color: #555; }
.kospi  { background: #E6F1FB; color: #185FA5; font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
.kosdaq { background: #EEEDFE; color: #534AB7; font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
.sector-tag { background: #F1EFE8; color: #5F5E5A; font-size: 11px; padding: 2px 7px; border-radius: 4px; }

/* Action btns */
.rm-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; }
.rm-btn:hover { color: #E24B4A; background: #FCEBEB; }

/* Drag & drop */
tr[draggable="true"] { cursor: grab; }
tr[draggable="true"]:active { cursor: grabbing; }
tr.dragging { opacity: 0.4; background: #EEEDFE; }
tr.drag-over td { border-top: 2px solid #534AB7 !important; }
.drag-handle { color: #ccc; cursor: grab; font-size: 14px; padding: 0 4px; user-select: none; }
.drag-handle:hover { color: #888; }

/* Mobile drag */
.card[draggable="true"] { cursor: grab; }
.card[draggable="true"]:active { cursor: grabbing; }
.card.dragging { opacity: 0.4; }
.card.drag-over { border-top: 2px solid #534AB7 !important; }

/* Bar */
.bar-wrap { display: flex; align-items: center; gap: 6px; }
.bar-bg { flex: 1; height: 5px; background: #f0f0f0; border-radius: 3px; min-width: 40px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; }

/* Chart legend */
.chart-legend { display: flex; gap: 8px; font-size: 10px; color: #aaa; margin-top: 3px; }
.legend-dot { display: inline-block; width: 20px; height: 2px; border-radius: 1px; vertical-align: middle; margin-right: 2px; }

/* Tab toggle */
.list-tabs { display: flex; gap: 0; background: #fff; border: 0.5px solid #e5e5e5; border-radius: 10px; overflow: hidden; margin-bottom: 16px; width: fit-content; }
.list-tab { font-size: 13px; padding: 8px 18px; cursor: pointer; color: #888; background: #fff; border: none; transition: all 0.15s; }
.list-tab.active { background: #1a1a1a; color: #fff; font-weight: 500; }
.list-tab:hover:not(.active) { background: #f5f5f3; color: #333; }

/* Mobile */
.card-list { display: none; }
.card { background: #fff; border-radius: 12px; border: 0.5px solid #e5e5e5; padding: 14px; margin-bottom: 10px; }
.card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
.card-name { font-size: 15px; font-weight: 600; }
.card-code { font-size: 11px; color: #aaa; margin-top: 2px; }
.card-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; margin-bottom: 10px; }
.card-item-label { font-size: 11px; color: #aaa; margin-bottom: 2px; }
.card-item-val { font-size: 13px; font-weight: 500; }

@media (max-width: 768px) {
  .wrap { padding: 16px 12px; }
  .add-input { width: 100%; flex: 1; }
  .ac-list { width: 100%; }
  .table-wrap { display: none; }
  .card-list { display: block; }
  .gnb-logo { margin-right: 16px; }
}
</style>
</head>
<body>
<nav class="gnb">
  <div class="gnb-inner">
    <a class="gnb-logo" href="index.html">🐯 야수의 <span>심장</span></a>
    <div class="gnb-nav">
      <a class="gnb-tab" href="index.html">종목 스크리너</a>
      <a class="gnb-tab" href="sector.html">섹터 대시보드</a>
      <a class="gnb-tab active" href="portfolio.html">보유종목 점검</a>
    </div>
  </div>
</nav>

<div class="wrap">
  <div class="page-header">
    <div>
      <div class="page-title">보유종목 점검</div>
      <div class="page-sub">보유 종목과 관심 종목의 기술적 현황을 한눈에 확인</div>
    </div>
  </div>

  <div class="add-area">
    <input class="add-input" type="text" id="addInput" placeholder="종목명 또는 코드로 검색..." oninput="onSearch()" onfocus="onSearch()" autocomplete="off">
    <div class="ac-list" id="acList"></div>
    <div class="list-tabs" style="margin-bottom:0;margin-left:12px">
      <button class="list-tab active" id="tab-hold" onclick="setAddTarget('hold')">보유종목에 추가</button>
      <button class="list-tab" id="tab-watch" onclick="setAddTarget('watch')">관심종목에 추가</button>
    </div>
  </div>

  <div class="section" id="hold-section">
    <div class="section-header">
      <span class="section-title">📦 보유종목</span>
      <span class="section-count" id="hold-count"></span>
    </div>
    <div id="hold-content"></div>
  </div>

  <div class="section" id="watch-section">
    <div class="section-header">
      <span class="section-title">👀 관심종목</span>
      <span class="section-count" id="watch-count"></span>
    </div>
    <div id="watch-content"></div>
  </div>
</div>

<script>
let allData = [];
let addTarget = 'hold'; // 'hold' or 'watch'

// localStorage keys
const HOLD_KEY  = 'portfolio_hold';
const WATCH_KEY = 'portfolio_watch';

function getList(key) {
  try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; }
}
function saveList(key, arr) { localStorage.setItem(key, JSON.stringify(arr)); }

function addStock(code, target) {
  const key = target === 'watch' ? WATCH_KEY : HOLD_KEY;
  const list = getList(key);
  if (!list.includes(code)) {
    list.push(code);
    saveList(key, list);
  }
  render();
}

function removeStock(code, target) {
  const key = target === 'watch' ? WATCH_KEY : HOLD_KEY;
  const list = getList(key).filter(c => c !== code);
  saveList(key, list);
  render();
}

function moveStock(code, target, dir) {
  const key = target === 'watch' ? WATCH_KEY : HOLD_KEY;
  const list = getList(key);
  const idx = list.indexOf(code);
  if (idx < 0) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= list.length) return;
  [list[idx], list[newIdx]] = [list[newIdx], list[idx]];
  saveList(key, list);
  render();
}

function setAddTarget(t) {
  addTarget = t;
  document.getElementById('tab-hold').className = 'list-tab' + (t==='hold'?' active':'');
  document.getElementById('tab-watch').className = 'list-tab' + (t==='watch'?' active':'');
}

// Autocomplete
function onSearch() {
  const q = document.getElementById('addInput').value.trim().toLowerCase();
  const acList = document.getElementById('acList');
  if (!q || q.length < 1) { acList.style.display = 'none'; return; }

  const holdList = getList(HOLD_KEY);
  const watchList = getList(WATCH_KEY);
  const matches = allData
    .filter(d => d.name.toLowerCase().includes(q) || d.code.includes(q))
    .filter(d => !holdList.includes(d.code) && !watchList.includes(d.code))
    .slice(0, 8);

  if (matches.length === 0) { acList.style.display = 'none'; return; }

  acList.innerHTML = matches.map(d =>
    `<div class="ac-item" onclick="pickStock('${d.code}')">
      <span>${d.name}</span>
      <span class="code">${d.code} · ${d.market}</span>
    </div>`
  ).join('');
  acList.style.display = 'block';
}

function pickStock(code) {
  addStock(code, addTarget);
  document.getElementById('addInput').value = '';
  document.getElementById('acList').style.display = 'none';
}

// Close autocomplete on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.add-area')) {
    document.getElementById('acList').style.display = 'none';
  }
});

// Format helpers
function fmtChg(v) { if (v==null) return '—'; return (v>=0?'+':'')+v.toFixed(1)+'%'; }

function signalBadge(sig) {
  if (sig==='strong') return '<span class="badge strong">강한돌파</span>';
  if (sig==='watch')  return '<span class="badge watch">관찰중</span>';
  return '<span class="badge weak">이탈</span>';
}

function alignBadge(d) {
  if (!d.ma10 || !d.ma30) return '';
  return d.ma10 > d.ma30
    ? '<span class="badge bull">정배열</span>'
    : '<span class="badge bear">역배열</span>';
}

function breakBadge(weeks) {
  if (weeks == null || weeks === 0) return '<span style="color:#ccc">—</span>';
  if (weeks === 1) return '<span class="badge first">최초돌파</span>';
  if (weeks > 1)   return `<span class="badge weeks">${weeks}주째</span>`;
  return '<span style="color:#ccc">—</span>';
}

function chartSvg(candles, ma10, ma20, ma30, w, h) {
  if (!candles || !candles.length) return '';
  const allVals = [
    ...candles.flatMap(c => [c[1], c[2]]),
    ...ma10.filter(v => v > 0),
    ...ma20.filter(v => v > 0),
    ...ma30.filter(v => v > 0)
  ];
  const min = Math.min(...allVals), max = Math.max(...allVals);
  if (max === min) return '';
  const pad = { t: 2, b: 2, l: 2, r: 2 };
  const iw = w - pad.l - pad.r;
  const ih = h - pad.t - pad.b;
  const n = candles.length;
  const slotW = iw / n;
  const cw = Math.max(1, slotW * 0.55);
  const y = v => pad.t + ih - ((v - min) / (max - min)) * ih;
  const px = i => pad.l + slotW * i + slotW / 2;
  let s = `<svg width="${w}" height="${h}" style="display:block;overflow:visible">`;
  candles.forEach(([o, hh, l, c], i) => {
    const x = px(i);
    const bull = c >= o;
    const col = bull ? '#1D9E75' : '#E24B4A';
    s += `<line x1="${x}" y1="${y(hh)}" x2="${x}" y2="${y(l)}" stroke="${col}" stroke-width="0.7"/>`;
    const top = y(Math.max(o, c)), bot = y(Math.min(o, c));
    const bh = Math.max(0.5, bot - top);
    s += `<rect x="${x - cw/2}" y="${top}" width="${cw}" height="${bh}" fill="${col}" rx="0.3"/>`;
  });
  function maPath(arr, color) {
    const pts = arr.map((v, i) => v > 0 ? `${px(i)},${y(v)}` : null).filter(Boolean);
    if (pts.length > 1) s += `<polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="1" opacity="0.7"/>`;
  }
  maPath(ma10, '#F5A623');
  maPath(ma20, '#9B59B6');
  maPath(ma30, '#3498DB');
  s += `</svg>`;
  return s;
}

// Render
function render() {
  renderSection('hold', getList(HOLD_KEY), '보유종목');
  renderSection('watch', getList(WATCH_KEY), '관심종목');
}

function renderSection(type, codes, label) {
  const stocks = codes.map(c => allData.find(d => d.code === c)).filter(Boolean);
  const countEl = document.getElementById(type + '-count');
  const contentEl = document.getElementById(type + '-content');
  countEl.textContent = stocks.length + '종목';

  if (stocks.length === 0) {
    contentEl.innerHTML = `<div class="section-empty">종목을 검색해서 추가해보세요</div>`;
    return;
  }

  // Desktop table
  let tableHtml = `<div class="table-wrap"><table>
    <thead><tr>
      <th></th>
      <th>종목</th>
      <th>현재가</th>
      <th>주간등락</th>
      <th>10주선 괴리율</th>
      <th>30주선 괴리율</th>
      <th>거래량강도</th>
      <th>6개월 차트</th>
      <th>10주선 돌파</th>
      <th>30주선 돌파</th>
      <th>신호</th>
      <th>배열</th>
    </tr></thead>
    <tbody>`;

  stocks.forEach(d => {
    const chgCls = (d.chg||0) >= 0 ? 'green' : 'red';
    const vw = Math.min(100, Math.round((d.vol / 5) * 100));
    const vc = d.vol >= 2 ? '#1D9E75' : d.vol >= 1 ? '#F5A623' : '#E24B4A';
    const chart = chartSvg(d.candles, d.ma10_line||[], d.ma20_line||[], d.ma30_line||[], 150, 52);
    tableHtml += `<tr draggable="true" data-code="${d.code}" data-type="${type}">
      <td><span class="drag-handle">☰</span> <button class="rm-btn" onclick="removeStock('${d.code}','${type}')" title="제거">✕</button></td>
      <td>
        <div style="font-weight:500">${d.name}</div>
        <div style="font-size:11px;color:#aaa;margin-top:2px">
          <span class="${d.market==='KOSPI'?'kospi':'kosdaq'}" style="margin-right:4px">${d.market}</span>
          <span class="sector-tag">${d.sector||'기타'}</span>
        </div>
      </td>
      <td style="font-weight:500">${(d.price||0).toLocaleString()}원</td>
      <td class="${chgCls}" style="font-weight:600">${fmtChg(d.chg)}</td>
      <td class="${(d.ma10gap||0)>=0?'green':'red'}">${fmtChg(d.ma10gap)}</td>
      <td class="${(d.ma30gap||0)>=0?'green':'red'}">${fmtChg(d.ma30gap)}</td>
      <td>
        <div class="bar-wrap">
          <div class="bar-bg"><div class="bar-fill" style="width:${vw}%;background:${vc}"></div></div>
          <span style="font-size:11px;white-space:nowrap">${(d.vol||0).toFixed(1)}x</span>
        </div>
      </td>
      <td>
        ${chart || '<span style="color:#ccc">—</span>'}
        ${chart ? `<div class="chart-legend"><span><span class="legend-dot" style="background:#F5A623"></span>10</span><span><span class="legend-dot" style="background:#9B59B6"></span>20</span><span><span class="legend-dot" style="background:#3498DB"></span>30</span></div>` : ''}
      </td>
      <td>${breakBadge(d.above_ma10_weeks)}</td>
      <td>${breakBadge(d.above_ma30_weeks)}</td>
      <td>${signalBadge(d.signal)}</td>
      <td>${alignBadge(d)}</td>
    </tr>`;
  });
  tableHtml += `</tbody></table></div>`;

  // Mobile cards
  let cardHtml = `<div class="card-list">`;
  stocks.forEach(d => {
    const chgCls = (d.chg||0) >= 0 ? 'green' : 'red';
    const chart = chartSvg(d.candles, d.ma10_line||[], d.ma20_line||[], d.ma30_line||[], 340, 110);
    cardHtml += `<div class="card" draggable="true" data-code="${d.code}" data-type="${type}">
      <div class="card-header">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="drag-handle">☰</span>
          <div>
            <div class="card-name">${d.name}</div>
            <div class="card-code">${d.code}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          ${signalBadge(d.signal)} ${alignBadge(d)}
          <button class="rm-btn" onclick="removeStock('${d.code}','${type}')">✕</button>
        </div>
      </div>
      <div class="card-meta">
        <span class="${d.market==='KOSPI'?'kospi':'kosdaq'}">${d.market}</span>
        <span class="sector-tag">${d.sector||'기타'}</span>
      </div>
      <div class="card-grid">
        <div><div class="card-item-label">현재가</div><div class="card-item-val">${(d.price||0).toLocaleString()}원</div></div>
        <div><div class="card-item-label">주간등락</div><div class="card-item-val ${chgCls}">${fmtChg(d.chg)}</div></div>
        <div><div class="card-item-label">10주선 괴리율</div><div class="card-item-val ${(d.ma10gap||0)>=0?'green':'red'}">${fmtChg(d.ma10gap)}</div></div>
        <div><div class="card-item-label">30주선 괴리율</div><div class="card-item-val ${(d.ma30gap||0)>=0?'green':'red'}">${fmtChg(d.ma30gap)}</div></div>
      </div>
      ${chart ? `<div style="border-radius:8px;overflow:hidden;background:#fafafa;margin-bottom:6px">${chart}</div>` : ''}
      <div style="display:flex;gap:12px;font-size:12px;padding-top:8px;border-top:0.5px solid #f0f0f0">
        <span><span style="color:#aaa">10주선</span> ${breakBadge(d.above_ma10_weeks)}</span>
        <span><span style="color:#aaa">30주선</span> ${breakBadge(d.above_ma30_weeks)}</span>
        <span style="margin-left:auto"><span style="color:#aaa">거래량</span> ${(d.vol||0).toFixed(1)}x</span>
      </div>
    </div>`;
  });
  cardHtml += `</div>`;

  contentEl.innerHTML = tableHtml + cardHtml;
  // Init drag on newly rendered elements
  contentEl.querySelectorAll('.table-wrap tbody').forEach(initDrag);
  contentEl.querySelectorAll('.card-list').forEach(initDrag);
}

// ── Drag & Drop ─────────────────────────────────
let dragCode = null;
let dragType = null;

function initDrag(container) {
  const items = container.querySelectorAll('[draggable="true"]');
  items.forEach(el => {
    el.addEventListener('dragstart', e => {
      dragCode = el.dataset.code;
      dragType = el.dataset.type;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      container.querySelectorAll('.drag-over').forEach(x => x.classList.remove('drag-over'));
      dragCode = null;
      dragType = null;
    });
    el.addEventListener('dragover', e => {
      e.preventDefault();
      if (el.dataset.type !== dragType || el.dataset.code === dragCode) return;
      e.dataTransfer.dropEffect = 'move';
      container.querySelectorAll('.drag-over').forEach(x => x.classList.remove('drag-over'));
      el.classList.add('drag-over');
    });
    el.addEventListener('dragleave', () => {
      el.classList.remove('drag-over');
    });
    el.addEventListener('drop', e => {
      e.preventDefault();
      el.classList.remove('drag-over');
      if (!dragCode || el.dataset.type !== dragType || el.dataset.code === dragCode) return;
      const key = dragType === 'watch' ? WATCH_KEY : HOLD_KEY;
      const list = getList(key);
      const fromIdx = list.indexOf(dragCode);
      const toIdx = list.indexOf(el.dataset.code);
      if (fromIdx < 0 || toIdx < 0) return;
      list.splice(fromIdx, 1);
      list.splice(toIdx, 0, dragCode);
      saveList(key, list);
      render();
    });
  });
}

// Load data
fetch('screener_result.json?v=' + Date.now())
  .then(r => r.json())
  .then(raw => {
    allData = raw.stocks || raw;
    render();
  })
  .catch(() => {
    document.getElementById('hold-content').innerHTML =
      `<div class="section-empty">screener_result.json을 불러올 수 없습니다. 스크리너를 먼저 실행해주세요.</div>`;
  });
</script>
